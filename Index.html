<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Poga Block - Complete Premium Edition</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            --grid-bg: #0f0d26;
            --cell-bg: #252152;
            
            /* Kid-Friendly Bright Candy Colors */
            --color-1: #ff2a74; /* Neon Candy Pink */
            --color-2: #00f0ff; /* Electric Cyan */
            --color-3: #ffaa00; /* Bright Tangerine */
            --color-4: #39ff14; /* Neon Lime Green */
            --color-5: #b026ff; /* Vibrant Purple */
        }

        body {
            font-family: 'Ubuntu', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Animated Start Screen Overlay */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e1065, #0f0d26);
            z-index: 50000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.65s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #start-screen.hidden {
            transform: translateY(-100%);
        }
        
        .logo-text {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #00f0ff, #39ff14, #ff2a74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            animation: pulseLogo 2s infinite alternate ease-in-out;
        }
        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,240,255,0.2)); }
            100% { transform: scale(1.04); filter: drop-shadow(0 0 15px rgba(255,42,116,0.5)); }
        }

        .play-btn {
            padding: 22px 65px;
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #39ff14, #00f0ff);
            color: #0f0d26;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(57, 255, 20, 0.4);
            letter-spacing: 1px;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        .play-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 10px rgba(57, 255, 20, 0.2);
        }

        /* Header & Dashboards */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90vw;
            max-width: 360px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f0ff, #39ff14, #ff2a74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dashboard {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .score-box {
            font-size: 15px;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }
        
        #score { color: #00f0ff; }
        #best { color: #ff2a74; }

        /* Settings Modal */
        #settings-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 13, 38, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 30000; opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(8px);
        }
        #settings-modal.active { opacity: 1; pointer-events: auto; }
        
        .modal-box {
            background: #252152; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px; border-radius: 24px; width: 280px;
        }
        .modal-box h3 { margin: 0 0 25px 0; text-align: center; font-size: 22px; color: #00f0ff; }
        
        .setting-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .setting-row span { font-weight: 700; font-size: 16px; }
        
        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4e498a; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #39ff14; }
        input:checked + .slider:before { transform: translateX(24px); }

        .close-btn {
            width: 100%; background: #ff2a74; color: white; border: none; padding: 12px;
            border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        #celebration-overlay {
            position: fixed;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 32px; font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px #00f0ff, 0 0 30px #ff2a74;
            z-index: 10000; pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        #celebration-overlay.active { transform: translate(-50%, -50%) scale(1); }

        /* Game Over Layout */
        #game-over-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 13, 38, 0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #game-over-screen.active { opacity: 1; pointer-events: auto; }

        #game-over-box {
            background: #252152; border: 2px solid #ff2a74; padding: 45px 35px; border-radius: 28px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transform: scale(0.85); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }
        #game-over-screen.active #game-over-box { transform: scale(1); }
        #game-over-box h2 { font-size: 34px; color: #ff2a74; margin: 0 0 10px 0; font-weight: 900; }

        .restart-btn {
            background: linear-gradient(135deg, #00f0ff, #b026ff); color: white; border: none;
            padding: 14px 45px; font-size: 18px; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4); text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s;
        }
        .restart-btn:active { transform: scale(0.95); }

        /* Grid Layout */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            background: var(--grid-bg);
            padding: 10px; border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            width: 88vw; max-width: 360px; aspect-ratio: 1 / 1;
            box-sizing: border-box; position: relative;
        }

        .cell {
            background-color: var(--cell-bg);
            border-radius: 8px;
            position: relative;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.15s ease;
        }
        
        .cell.preview-valid {
            opacity: 0.5;
            background: var(--preview-color) !important;
            border-radius: 8px;
        }

        /* Solid Bright Candy Colors */
        .c-1 { background: var(--color-1); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        .c-2 { background: var(--color-2); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        .c-3 { background: var(--color-3); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        .c-4 { background: var(--color-4); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        .c-5 { background: var(--color-5); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }

        .cell.filled {
            animation: popIn 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.75); }
            100% { transform: scale(1); }
        }

        /* Elastic Line Blast Animations */
        .cell.blasting { 
            animation: candyClear 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes candyClear { 
            0% { transform: scale(1); filter: brightness(1.3); opacity: 1; } 
            35% { transform: scale(1.18); filter: brightness(1.6); }
            100% { transform: scale(0); opacity: 0; } 
        }

        .cell.combo-blasting { 
            animation: superCandyClear 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes superCandyClear { 
            0% { transform: scale(1); filter: brightness(1.8); opacity: 1; } 
            30% { transform: scale(1.25) rotate(-5deg); filter: brightness(2.2); }
            100% { transform: scale(0) rotate(15deg); opacity: 0; } 
        }

        #shapes-container {
            display: flex; justify-content: space-around; align-items: center;
            width: 90vw; max-width: 360px; margin-top: 25px; min-height: 105px;
            background: rgba(255, 255, 255, 0.03); border-radius: 18px; padding: 10px;
            box-sizing: border-box; border: 2px dashed rgba(255, 255, 255, 0.05);
        }

        .shape { display: grid; gap: 4px; touch-action: none; position: relative; }
        .shape-cell { width: 22px; height: 22px; }
        .shape-cell-filled { width: 100%; height: 100%; border-radius: 7px; }

        /* Scale logic on drag handling */
        .shape.dragging {
            position: fixed !important; pointer-events: none; z-index: 9999; 
            transform: scale(1.15) !important; opacity: 0.95;
            transition: none !important;
        }
    </style>
</head>
<body>

    <!-- Start Screen Overlay -->
    <div id="start-screen">
        <div class="logo-text">POGA BLOCK</div>
        <button class="play-btn" onclick="initiateGamePlay()">PLAY POGA</button>
    </div>

    <header>
        <h1>POGA BLOCK</h1>
        <button class="settings-btn" onclick="handleButtonClick(() => toggleSettings(true))">⚙️</button>
    </header>
    
    <div id="dashboard">
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div class="score-box">BEST: <span id="best">0</span></div>
    </div>

    <div id="grid"></div>
    <div id="shapes-container"></div>
    <div id="celebration-overlay">SUPER BLAST!</div>

    <!-- Settings Menu -->
    <div id="settings-modal">
        <div class="modal-box">
            <h3>GAME SETTINGS</h3>
            <div class="setting-row">
                <span>Sound Effects</span>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle" checked onchange="playSound('ui-click')">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-row">
                <span>Vibration</span>
                <label class="switch">
                    <input type="checkbox" id="vibrate-toggle" checked onchange="triggerVibration(15)">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="close-btn" onclick="handleButtonClick(() => toggleSettings(false))">CLOSE</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <div id="game-over-box">
            <h2>GAME OVER</h2>
            <p style="font-size:18px; color:rgba(255,255,255,0.6); margin-bottom:30px;">Score: <span id="final-score" style="color:#00f0ff; font-weight:bold;">0</span></p>
            <button class="restart-btn" onclick="handleButtonClick(restartGame)">RESTART</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const shapesContainer = document.getElementById('shapes-container');
        const celebrationOverlay = document.getElementById('celebration-overlay');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreElement = document.getElementById('final-score');
        const settingsModal = document.getElementById('settings-modal');
        const startScreen = document.getElementById('start-screen');
        
        const soundToggle = document.getElementById('sound-toggle');
        const vibrateToggle = document.getElementById('vibrate-toggle');

        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bb_candy_best')) || 0;
        bestElement.innerText = bestScore;

        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null)); 
        let currentShapes = [];

        const shapeLayouts = [
            { layout: [[1, 1], [1, 1]], colorId: 1 },
            { layout: [[1, 1, 1, 1]], colorId: 2 },
            { layout: [[1], [1], [1], [1]], colorId: 2 },
            { layout: [[1]], colorId: 3 },
            { layout: [[1, 1, 1]], colorId: 4 },
            { layout: [[1], [1], [1]], colorId: 4 },
            { layout: [[1, 1], [1, 0]], colorId: 5 },
            { layout: [[1, 1], [0, 1]], colorId: 5 },
            { layout: [[1, 1, 1], [0, 1, 0]], colorId: 1 },
            { layout: [[1, 1, 1], [1, 0, 0]], colorId: 3 }
        ];

        // Trigger on Play Poga Click
        function initiateGamePlay() {
            startScreen.classList.add('hidden');
            playSound('combo');
            triggerVibration(40);
            setTimeout(spawnShapes, 300);
        }

        function triggerVibration(ms) {
            if (vibrateToggle.checked && navigator.vibrate) {
                navigator.vibrate(ms);
            }
        }

        function playSound(type) {
            if (!soundToggle.checked) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                if (type === 'drag-start') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(550, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(750, ctx.currentTime + 0.03);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.03);
                } else if (type === 'ui-click') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.35, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
                } else if (type === 'snap') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(450, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(650, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
                } else if (type === 'pop') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(520, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.55, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
                } else if (type === 'combo') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.6, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                } else if (type === 'gameover') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(190, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(65, ctx.currentTime + 0.45);
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.45);
                }
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e){}
        }

        function handleButtonClick(callbackAction) {
            playSound('ui-click');
            triggerVibration(15);
            if(callbackAction) callbackAction();
        }

        function toggleSettings(show) {
            if (show) settingsModal.classList.add('active');
            else settingsModal.classList.remove('active');
        }

        function createGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r; cell.dataset.col = c;
                    gridElement.appendChild(cell);
                }
            }
        }

        function updateGridUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.classList.remove('preview-valid');
                
                for(let i=1; i<=5; i++) cell.classList.remove(`c-${i}`);

                if (grid[r][c]) {
                    cell.classList.add('filled', `c-${grid[r][c]}`);
                } else if (!cell.classList.contains('blasting') && !cell.classList.contains('combo-blasting')) {
                    cell.classList.remove('filled');
                }
            });
        }

        function spawnShapes() {
            shapesContainer.innerHTML = '';
            currentShapes = [];

            for (let i = 0; i < 3; i++) {
                const config = shapeLayouts[Math.floor(Math.random() * shapeLayouts.length)];
                currentShapes.push(config);

                const shapeDiv = document.createElement('div');
                shapeDiv.classList.add('shape');
                shapeDiv.dataset.index = i;
                shapeDiv.style.gridTemplateRows = `repeat(${config.layout.length}, 1fr)`;
                shapeDiv.style.gridTemplateColumns = `repeat(${config.layout[0].length}, 1fr)`;

                config.layout.forEach(row => {
                    row.forEach(cellValue => {
                        const shapeCell = document.createElement('div');
                        shapeCell.classList.add('shape-cell');
                        if (cellValue === 1) {
                            const innerBlock = document.createElement('div');
                            innerBlock.classList.add('shape-cell-filled', `c-${config.colorId}`);
                            shapeCell.appendChild(innerBlock);
                        }
                        shapeDiv.appendChild(shapeCell);
                    });
                });

                addDragAndDropEvents(shapeDiv, i);
                shapesContainer.appendChild(shapeDiv);
            }

            if (!canAnyShapeBePlaced()) { triggerGameOver(); }
        }

        function canAnyShapeBePlaced() {
            return currentShapes.some(config => {
                if (!config) return false;
                const layout = config.layout;

                for (let r = 0; r <= GRID_SIZE - layout.length; r++) {
                    for (let c = 0; c <= GRID_SIZE - layout[0].length; c++) {
                        let canFit = true;
                        for (let sr = 0; sr < layout.length; sr++) {
                            for (let sc = 0; sc < layout[sr].length; sc++) {
                                if (layout[sr][sc] === 1 && grid[r + sr][c + sc] !== null) { canFit = false; break; }
                            }
                            if (!canFit) break;
                        }
                        if (canFit) return true;
                    }
                }
                return false;
            });
        }

        function triggerGameOver() {
            playSound('gameover');
            triggerVibration(200);
            finalScoreElement.innerText = score;
            gameOverScreen.classList.add('active');
        }

        function restartGame() {
            score = 0; scoreElement.innerText = score;
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            createGrid(); gameOverScreen.classList.remove('active');
            updateGridUI();
            spawnShapes();
        }

        function clearPreviews() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('preview-valid'));
        }

        function getTargetCoordinates(shapeDiv, layout) {
            const cells = document.querySelectorAll('.cell');
            const shapeCells = shapeDiv.querySelectorAll('.shape-cell');
            
            let targetLocalRow = 0, targetLocalCol = 0, found = false;
            for (let r = 0; r < layout.length; r++) {
                for (let c = 0; c < layout[r].length; c++) {
                    if (layout[r][c] === 1) { targetLocalRow = r; targetLocalCol = c; found = true; break; }
                }
                if (found) break;
            }

            const activeCellIndex = targetLocalRow * layout[0].length + targetLocalCol;
            if (!shapeCells[activeCellIndex]) return null;
            
            const targetCellRect = shapeCells[activeCellIndex].getBoundingClientRect();
            const targetX = targetCellRect.left + (targetCellRect.width / 2);
            const targetY = targetCellRect.top + (targetCellRect.height / 2);

            let closestCell = null; let minDistance = Infinity;
            
            cells.forEach(cell => {
                const cellRect = cell.getBoundingClientRect();
                const cellCenterX = cellRect.left + (cellRect.width / 2);
                const cellCenterY = cellRect.top + (cellRect.height / 2);
                const distance = Math.hypot(targetX - cellCenterX, targetY - cellCenterY);
                if (distance < minDistance) { minDistance = distance; closestCell = cell; }
            });

            if (!closestCell || minDistance > 45) return null;

            let startRow = parseInt(closestCell.dataset.row) - targetLocalRow;
            let startCol = parseInt(closestCell.dataset.col) - targetLocalCol;

            if (startRow + layout.length > GRID_SIZE || startCol + layout[0].length > GRID_SIZE || startRow < 0 || startCol < 0) return null;

            return { row: startRow, col: startCol };
        }

        let activePreviewKey = ""; 

        function showPreview(startRow, startCol, config) {
            const currentKey = `${startRow}_${startCol}`;
            const layout = config.layout;
            let canPlace = true; let cellsToHighlight = [];

            for (let r = 0; r < layout.length; r++) {
                for (let c = 0; c < layout[r].length; c++) {
                    if (layout[r][c] === 1) {
                        const targetRow = startRow + r; const targetCol = startCol + c;
                        if (grid[targetRow][targetCol] !== null) canPlace = false;
                        cellsToHighlight.push({r: targetRow, c: targetCol});
                    }
                }
            }

            if (canPlace) {
                if (activePreviewKey !== currentKey) {
                    clearPreviews();
                    const colorMap = ['','#ff2a74','#00f0ff','#ffaa00','#39ff14','#b026ff'];
                    gridElement.style.setProperty('--preview-color', colorMap[config.colorId]);
                    cellsToHighlight.forEach(pos => {
                        const cell = document.querySelector(`.cell[data-row="${pos.r}"][data-col="${pos.c}"]`);
                        if (cell) cell.classList.add('preview-valid');
                    });
                    activePreviewKey = currentKey;
                }
            } else {
                if(activePreviewKey !== "") { clearPreviews(); activePreviewKey = ""; }
            }
            return canPlace;
        }

        function addDragAndDropEvents(shapeDiv, index) {
            let startX, startY; let lastValidTarget = null;

            function onStart(e) {
                if (!currentShapes[index]) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = shapeDiv.getBoundingClientRect();
                
                startX = clientX - rect.left;
                startY = clientY - rect.top + (e.touches ? 90 : 0);

                shapeDiv.classList.add('dragging'); activePreviewKey = ""; 
                playSound('drag-start');
                triggerVibration(8);
                moveAt(clientX, clientY);

                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            }

            function moveAt(clientX, clientY) {
                shapeDiv.style.left = (clientX - startX) + 'px';
                shapeDiv.style.top = (clientY - startY) + 'px';
                
                const target = getTargetCoordinates(shapeDiv, currentShapes[index].layout);
                if (target) {
                    const canPlace = showPreview(target.row, target.col, currentShapes[index]);
                    lastValidTarget = canPlace ? target : null;
                } else {
                    if (activePreviewKey !== "") { clearPreviews(); activePreviewKey = ""; }
                    lastValidTarget = null;
                }
            }

            function onMove(e) {
                if(e.touches) e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                moveAt(clientX, clientY);
            }

            function onEnd() {
                document.removeEventListener('mousemove', onMove); document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup', onEnd); document.removeEventListener('touchend', onEnd);

                shapeDiv.classList.remove('dragging');
                shapeDiv.style.left = ''; shapeDiv.style.top = '';
                clearPreviews(); activePreviewKey = "";

                if (lastValidTarget) {
                    handleDrop(lastValidTarget.row, lastValidTarget.col, index, shapeDiv);
                }
                lastValidTarget = null;
            }

            shapeDiv.addEventListener('mousedown', onStart);
            shapeDiv.addEventListener('touchstart', onStart, { passive: true });
        }

        function handleDrop(startRow, startCol, shapeIndex, shapeDiv) {
            const config = currentShapes[shapeIndex];
            const layout = config.layout;

            for (let r = 0; r < layout.length; r++) {
                for (let c = 0; c < layout[r].length; c++) {
                    if (layout[r][c] === 1) grid[startRow + r][startCol + c] = config.colorId;
                }
            }
            shapeDiv.style.display = 'none';
            currentShapes[shapeIndex] = null;
            
            score += 20;
            if(score > bestScore) { bestScore = score; localStorage.setItem('bb_candy_best', bestScore); bestElement.innerText = bestScore; }
            scoreElement.innerText = score;

            playSound('snap');
            triggerVibration(12);
            updateGridUI();
            
            checkAndClearLines(config.colorId);

            if (currentShapes.every(s => s === null)) {
                spawnShapes();
            } else if (!canAnyShapeBePlaced()) {
                triggerGameOver();
            }
        }

        function checkAndClearLines(lastPlacedColorId) {
            let rowsToClear = []; let colsToClear = [];

            for (let r = 0; r < GRID_SIZE; r++) { if (grid[r].every(val => val !== null)) rowsToClear.push(r); }
            for (let c = 0; c < GRID_SIZE; c++) {
                let isColFull = true;
                for (let r = 0; r < GRID_SIZE; r++) { if (grid[r][c] === null) { isColFull = false; break; } }
                if (isColFull) colsToClear.push(c);
            }

            const totalLines = rowsToClear.length + colsToClear.length;

            if (totalLines > 0) {
                const isCombo = totalLines >= 2;
                if(isCombo) {
                    playSound('combo');
                    triggerVibration(50);
                    celebrationOverlay.innerText = `MEGA ${totalLines} LINE BLAST!`;
                    celebrationOverlay.classList.add('active');
                    setTimeout(() => celebrationOverlay.classList.remove('active'), 1000);
                } else {
                    playSound('pop');
                    triggerVibration(25);
                }

                const cells = document.querySelectorAll('.cell');
                
                cells.forEach(cell => {
                    const r = parseInt(cell.dataset.row); const c = parseInt(cell.dataset.col);
                    if (rowsToClear.includes(r) || colsToClear.includes(c)) {
                        for(let i=1; i<=5; i++) cell.classList.remove(`c-${i}`);
                        cell.classList.add(`c-${lastPlacedColorId}`);
                        cell.classList.add(isCombo ? 'combo-blasting' : 'blasting');
                    }
                });

                setTimeout(() => {
                    rowsToClear.forEach(r => grid[r] = Array(GRID_SIZE).fill(null));
                    colsToClear.forEach(c => { for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = null; });

                    cells.forEach(cell => cell.classList.remove('blasting', 'combo-blasting'));
                    
                    score += totalLines * 120 * (isCombo ? 2 : 1);
                    if (score > bestScore) { bestScore = score; localStorage.setItem('bb_candy_best', bestScore); bestElement.innerText = bestScore; }
                    scoreElement.innerText = score;
                    updateGridUI();
                }, 300);
            }
        }

        createGrid();
    </script>
</body>
</html>
